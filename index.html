<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家計手帳</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --paper:#F7F3EC;
    --paper-2:#EFE8DC;
    --ink:#3B3027;
    --ink-soft:#6B5D4F;
    --line:#D8CCB8;
    --accent:#A8754F;       /* 暖陶土 */
    --accent-2:#7C9070;     /* 橄欖綠 */
    --coffee:#2E251D;       /* 深咖啡輸入欄 */
    --income:#5E7F5A;
    --expense:#B0623F;
    --shadow:0 1px 3px rgba(59,48,39,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"Noto Serif TC","Songti TC",serif;
    background:var(--paper);
    color:var(--ink);
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:980px;margin:0 auto;padding:32px 20px 60px}

  header{margin-bottom:24px}
  .brand{font-size:30px;letter-spacing:4px;font-weight:700}
  .brand small{display:block;font-size:12px;letter-spacing:3px;color:var(--ink-soft);font-weight:400;margin-top:4px}
  .rule{height:2px;background:linear-gradient(90deg,var(--accent),transparent);margin-top:14px;border-radius:2px}

  /* 分頁 */
  .tabs{display:flex;gap:8px;margin:24px 0 20px}
  .tab{
    font-family:inherit;font-size:15px;letter-spacing:2px;
    padding:10px 22px;border:1px solid var(--line);background:transparent;
    color:var(--ink-soft);cursor:pointer;border-radius:10px 10px 0 0;transition:.2s;
  }
  .tab.active{background:var(--paper-2);color:var(--ink);border-bottom-color:var(--paper-2);font-weight:700}
  .tab:hover{color:var(--ink)}

  .page{display:none}
  .page.active{display:block;animation:fade .3s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1}}

  /* 統計卡 */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
  .stat{background:var(--paper-2);border:1px solid var(--line);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow)}
  .stat .label{font-size:12px;letter-spacing:2px;color:var(--ink-soft)}
  .stat .val{font-size:22px;font-weight:700;margin-top:4px}
  .stat .val.in{color:var(--income)}
  .stat .val.out{color:var(--expense)}

  /* 表單 */
  .form-card{background:var(--paper-2);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:20px;box-shadow:var(--shadow)}
  .form-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
  .field{display:flex;flex-direction:column;gap:4px}
  .field.wide{grid-column:span 2}
  .field label{font-size:11px;letter-spacing:1px;color:var(--ink-soft);padding-left:2px}
  input,select{
    font-family:inherit;font-size:14px;
    background:var(--coffee);color:#F1E7D8;
    border:1px solid #4A3C30;border-radius:8px;padding:9px 10px;width:100%;
  }
  input::placeholder{color:#9C8B79}
  input:focus,select:focus{outline:2px solid var(--accent);outline-offset:1px}
  select option{background:var(--coffee)}
  .btn{
    font-family:inherit;font-size:14px;letter-spacing:2px;cursor:pointer;
    background:var(--accent);color:#FBF6EE;border:none;border-radius:8px;padding:10px 18px;transition:.2s;
  }
  .btn:hover{background:#946343}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink-soft)}
  .btn.ghost:hover{border-color:var(--accent);color:var(--ink)}
  .form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:12px;flex-wrap:wrap}

  /* 表格 */
  .table-card{background:#FCFAF5;border:1px solid var(--line);border-radius:12px;padding:6px;box-shadow:var(--shadow);overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:14px;min-width:680px}
  th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line)}
  th{font-size:12px;letter-spacing:1px;color:var(--ink-soft);font-weight:400;background:var(--paper-2)}
  th:first-child{border-radius:8px 0 0 0}
  th:last-child{border-radius:0 8px 0 0}
  td.num{text-align:right;font-variant-numeric:tabular-nums}
  .in-amt{color:var(--income)}
  .out-amt{color:var(--expense)}
  .bal{font-weight:700}
  tr:hover td{background:#F5EFE4}
  .cat-chip{display:inline-block;background:var(--paper-2);border:1px solid var(--line);border-radius:20px;padding:2px 10px;font-size:12px}
  .del{cursor:pointer;color:#B0623F;font-size:12px;border:none;background:none;font-family:inherit}
  .del:hover{text-decoration:underline}
  .empty{text-align:center;color:var(--ink-soft);padding:30px;font-size:14px}

  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:10px}
  .toolbar h3{font-size:16px;letter-spacing:2px;font-weight:700}

  .chart-card{background:#FCFAF5;border:1px solid var(--line);border-radius:12px;padding:20px;box-shadow:var(--shadow);margin-bottom:20px}
  .chart-card h3{font-size:15px;letter-spacing:2px;margin-bottom:14px;font-weight:700}
  .chart-wrap{max-width:380px;margin:0 auto}

  footer.ip{font-size:12px;color:#888;padding:24px 4px 0;line-height:1.7;border-top:1px solid var(--line);margin-top:32px}

  @media(max-width:720px){
    .form-grid{grid-template-columns:repeat(2,1fr)}
    .field.wide{grid-column:span 2}
    .stats{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">家計手帳<small>HOUSEHOLD &amp; PERSONAL LEDGER ・ 新臺幣 NT$</small></div>
    <div class="rule"></div>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="home">家計簿</button>
    <button class="tab" data-tab="personal">個人支出</button>
  </div>

  <!-- ===== 家計簿 ===== -->
  <section class="page active" id="page-home">
    <div class="stats" id="stats-home"></div>

    <div class="form-card">
      <div class="form-grid">
        <div class="field"><label>日期</label><input type="date" id="h-date"></div>
        <div class="field"><label>分類</label>
          <select id="h-cat">
            <option>飲食</option><option>居家</option><option>交通</option>
            <option>水電瓦斯</option><option>教育</option><option>醫療</option>
            <option>娛樂</option><option>薪資</option><option>其他收入</option><option>其他</option>
          </select>
        </div>
        <div class="field wide"><label>明細</label><input type="text" id="h-desc" placeholder="例：晚餐食材"></div>
        <div class="field"><label>收入</label><input type="number" id="h-in" placeholder="0" min="0"></div>
        <div class="field"><label>支出</label><input type="number" id="h-out" placeholder="0" min="0"></div>
        <div class="field wide"><label>Note</label><input type="text" id="h-note" placeholder="備註（可空）"></div>
      </div>
      <div class="form-actions">
        <button class="btn" onclick="addRow('home')">新增一筆</button>
      </div>
    </div>

    <div class="toolbar">
      <h3>明細表</h3>
      <button class="btn ghost" onclick="exportImage('home')">匯出圖片分享</button>
    </div>
    <div class="table-card" id="cap-home">
      <table>
        <thead><tr>
          <th>日期</th><th>分類</th><th>明細</th><th>收入</th><th>支出</th><th>餘額</th><th>Note</th><th></th>
        </tr></thead>
        <tbody id="body-home"></tbody>
      </table>
    </div>
  </section>

  <!-- ===== 個人支出 ===== -->
  <section class="page" id="page-personal">
    <div class="stats" id="stats-personal"></div>

    <div class="chart-card">
      <h3>分類支出佔比</h3>
      <div class="chart-wrap"><canvas id="pie"></canvas></div>
    </div>

    <div class="form-card">
      <div class="form-grid">
        <div class="field"><label>日期</label><input type="date" id="p-date"></div>
        <div class="field"><label>分類</label>
          <select id="p-cat">
            <option>伙食</option><option>交通</option><option>家用</option>
            <option>家補</option><option>娛樂</option><option>雜支</option>
            <option>電信</option><option>保險</option><option>特支</option><option>其他</option>
          </select>
        </div>
        <div class="field wide"><label>明細</label><input type="text" id="p-desc" placeholder="例：咖啡"></div>
        <div class="field"><label>收入</label><input type="number" id="p-in" placeholder="0" min="0"></div>
        <div class="field"><label>支出</label><input type="number" id="p-out" placeholder="0" min="0"></div>
        <div class="field wide"><label>Note</label><input type="text" id="p-note" placeholder="備註（可空）"></div>
      </div>
      <div class="form-actions">
        <button class="btn" onclick="addRow('personal')">新增一筆</button>
      </div>
    </div>

    <div class="toolbar"><h3>明細表</h3></div>
    <div class="table-card">
      <table>
        <thead><tr>
          <th>日期</th><th>分類</th><th>明細</th><th>收入</th><th>支出</th><th>餘額</th><th>Note</th><th></th>
        </tr></thead>
        <tbody id="body-personal"></tbody>
      </table>
    </div>
  </section>

  <footer class="ip">
    本網站所有內容（包含文字、設計與結構）皆受著作權保護，未經授權不得複製、重製或用於商業用途。
  </footer>
</div>

<script>
/* ---------- 資料 ---------- */
const KEY = {home:'ledger_home', personal:'ledger_personal'};
let data = {home:[], personal:[]};

function load(){
  for(const k of ['home','personal']){
    try{ data[k] = JSON.parse(localStorage.getItem(KEY[k])) || []; }
    catch{ data[k] = []; }
  }
}
function save(k){ localStorage.setItem(KEY[k], JSON.stringify(data[k])); }

const fmt = n => 'NT$' + Number(n||0).toLocaleString('zh-TW');

/* ---------- 新增 ---------- */
function addRow(k){
  const p = k==='home' ? 'h' : 'p';
  const date = document.getElementById(p+'-date').value;
  const desc = document.getElementById(p+'-desc').value.trim();
  const income = parseFloat(document.getElementById(p+'-in').value) || 0;
  const expense = parseFloat(document.getElementById(p+'-out').value) || 0;
  if(!date){ alert('請選擇日期'); return; }
  if(income===0 && expense===0){ alert('請至少填入收入或支出金額'); return; }
  data[k].push({
    date, cat: document.getElementById(p+'-cat').value, desc,
    income, expense, note: document.getElementById(p+'-note').value.trim()
  });
  save(k); render(k);
  document.getElementById(p+'-desc').value='';
  document.getElementById(p+'-in').value='';
  document.getElementById(p+'-out').value='';
  document.getElementById(p+'-note').value='';
}

function delRow(k,i){ if(confirm('刪除這一筆？')){ data[k].splice(i,1); save(k); render(k); } }

/* ---------- 渲染 ---------- */
function render(k){
  const rows = [...data[k]].map((r,idx)=>({...r,_i:idx}))
    .sort((a,b)=> a.date.localeCompare(b.date));
  let bal=0, totIn=0, totOut=0;
  const body = document.getElementById('body-'+k);
  body.innerHTML='';
  if(rows.length===0){
    body.innerHTML='<tr><td colspan="8" class="empty">尚無紀錄，從上方新增第一筆吧。</td></tr>';
  }
  rows.forEach(r=>{
    bal += (r.income - r.expense); totIn += r.income; totOut += r.expense;
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td>${r.date}</td>
      <td><span class="cat-chip">${r.cat}</span></td>
      <td>${r.desc||'—'}</td>
      <td class="num in-amt">${r.income?fmt(r.income):''}</td>
      <td class="num out-amt">${r.expense?fmt(r.expense):''}</td>
      <td class="num bal">${fmt(bal)}</td>
      <td>${r.note||''}</td>
      <td><button class="del" onclick="delRow('${k}',${r._i})">刪除</button></td>`;
    body.appendChild(tr);
  });

  document.getElementById('stats-'+k).innerHTML=`
    <div class="stat"><div class="label">總收入</div><div class="val in">${fmt(totIn)}</div></div>
    <div class="stat"><div class="label">總支出</div><div class="val out">${fmt(totOut)}</div></div>
    <div class="stat"><div class="label">結餘</div><div class="val">${fmt(totIn-totOut)}</div></div>`;

  if(k==='personal') renderPie();
}

/* ---------- 餅圖 ---------- */
let pie;
function renderPie(){
  const agg={};
  data.personal.forEach(r=>{ if(r.expense>0) agg[r.cat]=(agg[r.cat]||0)+r.expense; });
  const labels=Object.keys(agg), vals=Object.values(agg);
  const palette=['#A8754F','#7C9070','#B0623F','#C9A36B','#6B8E9E','#9C7B9A','#8A9A5B','#D08C60','#7D6B5D','#A98467'];
  const ctx=document.getElementById('pie');
  if(pie) pie.destroy();
  if(labels.length===0){
    if(ctx.getContext){const c=ctx.getContext('2d');c.clearRect(0,0,ctx.width,ctx.height);}
    return;
  }
  pie=new Chart(ctx,{
    type:'doughnut',
    data:{labels,datasets:[{data:vals,backgroundColor:palette,borderColor:'#FCFAF5',borderWidth:2}]},
    options:{plugins:{legend:{position:'bottom',labels:{font:{family:'Noto Serif TC',size:13},color:'#3B3027'}},
      tooltip:{callbacks:{label:c=>` ${c.label}：NT$${c.raw.toLocaleString('zh-TW')}`}}}}
  });
}

/* ---------- 匯出圖片 ---------- */
function exportImage(k){
  const el=document.getElementById('cap-'+k);
  html2canvas(el,{backgroundColor:'#FCFAF5',scale:2}).then(canvas=>{
    const a=document.createElement('a');
    a.download='家計簿_'+new Date().toISOString().slice(0,10)+'.png';
    a.href=canvas.toDataURL('image/png'); a.click();
  });
}

/* ---------- 分頁 ---------- */
document.querySelectorAll('.tab').forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('page-'+t.dataset.tab).classList.add('active');
    if(t.dataset.tab==='personal') renderPie();
  };
});

/* ---------- 初始 ---------- */
const today=new Date().toISOString().slice(0,10);
document.getElementById('h-date').value=today;
document.getElementById('p-date').value=today;
load(); render('home'); render('personal');
</script>
</body>
</html>
